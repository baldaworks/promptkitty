# Generated by "omnidist ci" and customized for npm-only publishing.
# Reapply the npm-only customization after regenerating this workflow.
name: omnidist-release

on:
  push:
    tags:
      - "v*"

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
      - name: Verify release version
        run: test "$(go run ./cmd/promptkitty --version)" = "promptkitty version ${GITHUB_REF_NAME#v}"
      - run: go test ./...
      - run: go test -race ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - run: go tool govulncheck ./...

  prepare:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install omnidist
        run: npm install -g '@omnidist/omnidist@0.1.31'
      - name: Build artifacts
        run: omnidist --profile 'default' build
      - name: Stage npm artifacts
        run: omnidist --profile 'default' stage --only npm
      # Omnidist 0.1.31 does not expose these npm manifest fields and generates
      # the meta-package description as "Meta package for promptkitty".
      - name: Complete npm package metadata
        working-directory: .omnidist/default/npm/@baldaworks/promptkitty
        run: |
          npm pkg set \
            'description=PromptKit workflows for coding agents, the command line, and Go.' \
            'homepage=https://github.com/baldaworks/promptkitty#readme' \
            'bugs.url=https://github.com/baldaworks/promptkitty/issues' \
            'author.name=Baldaworks' \
            'author.url=https://github.com/baldaworks'
      - name: Include vecgo license in npm artifacts
        run: |
          for license in .omnidist/default/npm/@baldaworks/*/LICENSE; do
            printf '\n\nThird-party component: vecgo v0.0.15\n\n' >> "$license"
            cat third_party/vecgo/LICENSE >> "$license"
          done
      - name: Verify npm artifacts
        run: omnidist --profile 'default' verify --only npm
      - name: Pack staged artifacts
        run: tar -czf omnidist-staged.tgz .omnidist/default
      - name: Upload staged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: omnidist-staged
          path: omnidist-staged.tgz

  publish_npm:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install omnidist
        run: npm install -g '@omnidist/omnidist@0.1.31'
      - name: Download staged artifacts
        uses: actions/download-artifact@v8
        with:
          name: omnidist-staged
      - name: Restore staged artifacts
        run: tar -xzf omnidist-staged.tgz
      - name: Publish npm artifacts
        run: omnidist --profile 'default' npm publish
